name: sri_hr
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6

  # Backend
  supabase_flutter: ^2.3.0

  # UI
  fl_chart: ^1.2.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Navigation & Responsive
  go_router: ^17.2.2
  responsive_builder: ^0.7.0

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  get_storage: ^2.1.1

  # File/Image Pick
  image_picker: ^1.0.7
  file_picker: ^11.0.2

  # Location
  geolocator: ^14.0.2

  # Payment
  # razorpay_flutter: ^1.3.6
  razorpay_web: ^3.1.0

  # OTP
  pinput: ^6.0.2

  # Date/Time
  table_calendar: ^3.1.0

  # Network
  dio: ^5.4.1
  connectivity_plus: ^7.1.1

  # Permissions
  permission_handler: ^12.0.1

  # Other
  flutter_dotenv: ^6.0.1
  country_state_city_picker: ^2.0.0
  font_awesome_flutter: ^11.0.0
  dropdown_search: ^7.0.0
  responsive_grid: ^2.4.4
  http: ^1.2.0
  ntp: ^2.0.0

  facesdk_plugin:
    path: ./facesdk_plugin
  flutter_exif_rotation: ^0.5.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8

flutter:

  uses-material-design: true
  assets:
    - assets/mobilefacenet.tflite
    - assets/images/
    - assets/images/gif/
    - .env

  fonts:
    - family: SriHR
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
